<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>李葬/星梦 - 个人主页</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --card-bg: #1e293b;
            --card-hover: #334155;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,0.2) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,0.2) 0, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Hero Section */
        .hero {
            display: flex;
            align-items: center;
            gap: 3rem;
            margin-bottom: 4rem;
            padding: 2rem;
            background: rgba(30, 41, 59, 0.5);
            border-radius: 1.5rem;
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease;
        }

        .hero:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.5);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            flex-shrink: 0;
        }

        .hero-content h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            color: transparent;
        }

        .hero-content .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .hero-content .bio {
            font-size: 1rem;
            color: var(--text-primary);
        }

        /* Sections */
        section {
            margin-bottom: 3rem;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        h2 i {
            color: var(--accent);
        }

        /* Grid Layouts */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--border);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            border-color: var(--accent);
        }

        .card h3 {
            color: var(--accent);
            margin-bottom: 1rem;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Tags */
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .tag {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.9rem;
            border: 1px solid rgba(56, 189, 248, 0.2);
            transition: background 0.3s;
        }

        .tag:hover {
            background: rgba(56, 189, 248, 0.2);
        }

        /* Lists */
        ul {
            list-style-position: inside;
            color: var(--text-secondary);
        }
        
        li {
            margin-bottom: 0.5rem;
        }

        /* Friend Links */
        .friend-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            color: inherit;
            position: relative;
            overflow: hidden;
            padding: 1.5rem;
            background: var(--card-bg);
            border-radius: 1rem;
            border: 1px solid var(--border);
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .friend-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
        }

        .friend-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.1);
            z-index: 1;
            background-color: var(--card-hover);
        }

        .friend-content {
            position: relative;
            z-index: 1;
        }

        .friend-name {
            font-weight: bold;
            color: var(--text-primary);
            font-size: 1.2rem;
            margin-bottom: 0.2rem;
        }
        
        .friend-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero {
                flex-direction: column;
                text-align: center;
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Content will be injected here by JS -->
        <div style="text-align: center; padding: 5rem;">
            <h2><i class="fas fa-spinner fa-spin"></i> 正在加载主页信息...</h2>
        </div>
    </div>

    <script>
        // 内置备用数据，以防 file:// 协议下跨域限制导致无法读取本地 JSON
        const fallbackData = {
          "profile": {
            "picture": "src/Image_1765633314146.jpg",
            "handleAndPenName": "李葬/星梦",
            "englishName": "Bury·Lee,StarDreamer",
            "basicInfo": "编程爱好 & 诗人 & 小说创作",
            "bio": "热衷现代化开发（尤其是互联网）与喜欢了解AI技术，喜欢尝试新技术并分享经验。艺术创作方面偏向于写悲伤基调的诗词，虽未正式创作小说(因为文笔不好)，但已构建了四个宏大的世界观(?)",
            "knowledgeBase": "操作系统、组成原理、数据结构、数据库、计算机网络、机器学习、少量深度学习及分布式知识。",
            "technicalSkills": {
              "primaryLanguages": ["Python", "Go"],
              "familiarLanguages": ["C/C++", "Java", "Rust"],
              "techStack": {
                "aiAndData": ["PyTorch", "Torchvision"],
                "backendAndServices": ["Flask", "Gin"],
                "storageAndRetrieval": ["MySQL", "Redis", "Elasticsearch"]
              }
            },
            "currentProjects": {
              "featureRichCrawlerLibrary": {
                "status": "正在开发中",
                "features": ["高并发", "面向对象设计", "对非专业人士友好"]
              },
              "backendWebsite": {
                "status": "正在开发一个带后端服务的较简易网站"
              },
              "todoList": ["开发一个分布式的云盘系统"]
            },
            "artisticCreation": {
              "poetry": "偏好以“悲伤”为基调的词作。",
              "fiction": {
                "description": "目前处于世界观构建阶段，有以下四个世界观设定：(由于文笔差迟迟未写)",
                "worldviews": [
                  "深渊世界（黑暗类克苏鲁风格）",
                  "传奇之后（带魔法体系的玄幻风格）",
                  "传说之后（带神明和魔法体系的魔幻风格）",
                  "灰烬时代（科幻末世风格）"
                ]
              }
            },
            "friendLinks": [
              {
                "name": "麦芽唐",
                "picture": "src/Image_1774187732093_334.png",
                "description": "小动物画师",
                "url": "other/MYT/index.html"
              }
            ]
          }
        };

        // 渲染页面的主函数
        function renderPage(data) {
            const p = data.profile;
            const app = document.getElementById('app');
            
            app.innerHTML = `
                <!-- 头部个人信息 -->
                <div class="hero">
                    <img src="${p.picture}" alt="Avatar" class="avatar" onerror="this.src='https://via.placeholder.com/150/1e293b/38bdf8?text=Avatar'">
                    <div class="hero-content">
                        <h1>${p.handleAndPenName}</h1>
                        <div class="subtitle">
                            <strong>${p.englishName}</strong> | ${p.basicInfo}
                        </div>
                        <p class="bio">${p.bio}</p>
                    </div>
                </div>

                <!-- 技能与知识储备 -->
                <section>
                    <h2><i class="fas fa-laptop-code"></i> 技能|知识储备</h2>
                    <div class="grid-2">
                        <div class="card">
                            <h3><i class="fas fa-code"></i> 编程语言</h3>
                            <div style="margin-bottom: 1rem;">
                                <div style="color: var(--text-secondary); margin-bottom: 0.5rem; font-size: 0.9rem;">主要语言</div>
                                <div class="tags">
                                    ${p.technicalSkills.primaryLanguages.map(l => `<span class="tag">${l}</span>`).join('')}
                                </div>
                            </div>
                            <div>
                                <div style="color: var(--text-secondary); margin-bottom: 0.5rem; font-size: 0.9rem;">熟悉语言</div>
                                <div class="tags">
                                    ${p.technicalSkills.familiarLanguages.map(l => `<span class="tag">${l}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                        <div class="card">
                            <h3><i class="fas fa-layer-group"></i> 技术栈</h3>
                            <div style="margin-bottom: 1rem;">
                                <div style="color: var(--text-secondary); margin-bottom: 0.5rem; font-size: 0.9rem;">AI与数据</div>
                                <div class="tags">
                                    ${p.technicalSkills.techStack.aiAndData.map(t => `<span class="tag">${t}</span>`).join('')}
                                </div>
                            </div>
                            <div style="margin-bottom: 1rem;">
                                <div style="color: var(--text-secondary); margin-bottom: 0.5rem; font-size: 0.9rem;">后端与服务</div>
                                <div class="tags">
                                    ${p.technicalSkills.techStack.backendAndServices.map(t => `<span class="tag">${t}</span>`).join('')}
                                </div>
                            </div>
                            <div>
                                <div style="color: var(--text-secondary); margin-bottom: 0.5rem; font-size: 0.9rem;">存储与检索</div>
                                <div class="tags">
                                    ${p.technicalSkills.techStack.storageAndRetrieval.map(t => `<span class="tag">${t}</span>`).join('')}
                                </div>
                            </div>
                        </div>
                        <div class="card" style="grid-column: 1 / -1;">
                            <h3><i class="fas fa-brain"></i> 知识储备</h3>
                            <p style="color: var(--text-secondary);">${p.knowledgeBase}</p>
                        </div>
                    </div>
                </section>

                <!-- 当前项目 -->
                <section>
                    <h2><i class="fas fa-project-diagram"></i> 当前项目 & 计划</h2>
                    <div class="grid-2">
                        <div class="card">
                            <h3> GoSight</h3>
                            <p style="color: var(--text-secondary); margin-bottom: 1rem;">状态：${p.currentProjects.featureRichCrawlerLibrary.status}</p>
                            <div class="tags">
                                ${p.currentProjects.featureRichCrawlerLibrary.features.map(f => `<span class="tag">${f}</span>`).join('')}
                            </div>
                        </div>
                        <div class="card">
                            <h3> 小网站</h3>
                            <p style="color: var(--text-secondary);">${p.currentProjects.backendWebsite.status}</p>
                        </div>
                        <div class="card">
                            <h3>(To-Do)</h3>
                            <ul>
                                ${p.currentProjects.todoList.map(t => `<li>${t}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                </section>

                <!-- 艺术创作 -->
                <section>
                    <h2><i class="fas fa-feather-alt"></i> 艺术创作</h2>
                    <div class="grid-2">
                        <div class="card">
                            <h3><i class="fas fa-book-open"></i> 诗词</h3>
                            <p style="color: var(--text-secondary);">${p.artisticCreation.poetry}</p>
                        </div>
                        <div class="card">
                            <h3><i class="fas fa-globe"></i> 小说世界观</h3>
                            <p style="color: var(--text-secondary); margin-bottom: 1rem; font-size: 0.9rem;">${p.artisticCreation.fiction.description}</p>
                            <ul>
                                ${p.artisticCreation.fiction.worldviews.map(w => `<li>${w}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                </section>

                <!-- 友情链接 -->
                <section>
                    <h2><i class="fas fa-user-friends"></i> 友情链接</h2>
                    <div class="grid-2">
                        ${p.friendLinks.map(link => `
                            <a href="${link.url}" target="_blank" class="friend-card">
                                <img src="${link.picture}" class="friend-avatar" onerror="this.src='https://via.placeholder.com/60/1e293b/38bdf8?text=Friend'">
                                <div class="friend-content">
                                    <div class="friend-name">${link.name}</div>
                                    <div class="friend-desc">${link.description}</div>
                                </div>
                            </a>
                        `).join('')}
                    </div>
                </section>
                
                <footer style="text-align: center; margin-top: 4rem; padding-top: 2rem; border-top: 1px solid var(--border); color: var(--text-secondary);">
                    <p>© 2026 ${p.handleAndPenName}. Designed with 💙</p>
                </footer>
            `;
        }

        // 尝试加载同目录下的 info.json 文件
        // 如果是在本地直接双击打开 html（file://），fetch 可能会跨域报错，此时使用 fallbackData
        fetch('src/info.json')
            .then(response => {
                if (!response.ok) throw new Error('网络响应不正常');
                return response.json();
            })
            .then(data => renderPage(data))
            .catch(error => {
                console.log('读取 info.json 失败 (可能因 file:// 协议限制)，已使用内置备用数据:', error);
                renderPage(fallbackData);
            });
    </script>
</body>
</html>
